name: Build LineageOS Kernel with KernelSU Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_google_redbull
          ref: lineage-23.2 # 23相当の最新ブランチを指定
          path: kernel

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev setup-repositories-shell

      - name: Set up Toolchains (Clang & GCC)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          # AOSPの最新Clangを取得
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang
          # GCC (libgcc用)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 aarch64-gcc
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 arm-gcc

      - name: Integrate KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/aarch64-gcc/bin:$GITHUB_WORKSPACE/toolchain/arm-gcc/bin:$PATH
          
          # ビルド引数
          MAKE_ARGS="
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LLVM=1 \
            LLVM_IAS=1
          "
          
          # Config適用 (bramble/redfin共用)
          make $MAKE_ARGS b3b1_defconfig
          
          # KernelSU Next用のConfig有効化
          ./scripts/config --enable CONFIG_KPROBES
          ./scripts/config --enable CONFIG_HAVE_KPROBES
          ./scripts/config --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --enable CONFIG_OVERLAY_FS
          
          # ビルド開始
          make -j$(nproc) $MAKE_ARGS

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Image.lz4-bramble
          path: kernel/arch/arm64/boot/Image.lz4

