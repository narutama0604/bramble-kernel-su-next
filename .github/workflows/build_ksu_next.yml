name: Build LineageOS Redbull Kernel with KernelSU Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_google_redbull
          ref: lineage-23.2
          path: kernel

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev \
            libncurses-dev git curl wget tar zip lz4 cpio python3 python-is-python3

      - name: Set up Toolchains
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          # AOSP Clang
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang
          # AOSP GCC (4.19にはこれが必要です)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 aarch64-gcc
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 arm-gcc

      - name: Integrate KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # 404を避けるため直接クローン
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next KernelSU-Next
          cp -r KernelSU-Next/kernel drivers/kernelsu
          
          # Makefileに追記
          echo 'obj-y += kernelsu/' >> drivers/Makefile
          
          # Kconfigの最後にsourceを追加（sedの失敗を避けるため安全な方法に変更）
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

          # Non-GKI (4.19) 用の kprobes パッチ
          if [ -f kernel/kprobes.c ]; then
            echo "EXPORT_SYMBOL_GPL(kprobe_on_func_entry);" >> kernel/kprobes.c
          fi

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # パスを確実に通す
          CLANG_BIN=$(find $GITHUB_WORKSPACE/toolchain/clang -name "clang" -type f | head -n 1 | xargs dirname)
          GCC64_BIN=$GITHUB_WORKSPACE/toolchain/aarch64-gcc/bin
          GCC32_BIN=$GITHUB_WORKSPACE/toolchain/arm-gcc/bin
          export PATH=$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH
          
          # 環境変数の設定
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-

          # 1. Defconfig 適用 (bramble/redfin 用)
          make O=out vendor/redbull_defconfig
          
          # 2. KernelSU Next 用の設定を有効化
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file out/.config --enable CONFIG_OVERLAY_FS
          
          # 3. ビルド実行 (エラーログを見やすくするため出力を分離)
          make -j$(nproc) O=out LLVM=1 LLVM_IAS=1 2>&1 | tee build_log.txt

      - name: Check Output
        run: |
          if [ -f kernel/out/arch/arm64/boot/Image.lz4 ]; then
            echo "Build Success!"
          else
            echo "Build Failed. Check the end of build_log.txt"
            tail -n 100 kernel/build_log.txt
            exit 1
          fi

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Next-Bramble
          path: kernel/out/arch/arm64/boot/Image.lz4
