      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # 1. 各ツールチェーンの bin ディレクトリを絶対パスで確実に取得
          CLANG_BIN=$(find $GITHUB_WORKSPACE/toolchain/clang -name "clang" -type f | head -n 1 | xargs dirname)
          GCC64_BIN=$(find $GITHUB_WORKSPACE/toolchain/aarch64-gcc -name "aarch64-linux-android-gcc" -type f | head -n 1 | xargs dirname)
          GCC32_BIN=$(find $GITHUB_WORKSPACE/toolchain/arm-gcc -name "arm-linux-androideabi-gcc" -type f | head -n 1 | xargs dirname)
          
          # 2. PATH に追加（GCC_BIN が空でないか確認しながら）
          export PATH=$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH
          
          # 3. 環境変数の設定 (LLVM=1 を使用するため一部を簡略化)
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # 4. Defconfig 適用
          # Pixel 4a 5G の redbull 4.19 では、CC=clang だけでなく LLVM=1 を渡すのが現代的です
          make O=out $MAKE_ARGS LLVM=1 LLVM_IAS=1 vendor/redbull_defconfig
          
          # 5. KernelSU Next 用の設定を有効化
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --enable CONFIG_OVERLAY_FS
          
          # 6. ビルド実行
          # 直接 make の引数に CC や CROSS_COMPILE を明示して、環境変数に頼りすぎないようにします
          make -j$(nproc) O=out \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            2>&1 | tee build_log.txt
